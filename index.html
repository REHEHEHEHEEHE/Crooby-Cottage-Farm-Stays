<!DOCTYPE html>

    <style>
        body {
            background-color: #f0f4f8; /* Soft blue/gray background */
            color: #333333;            /* Dark grey text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        a {
            display: inline-block;
            background-color: #ffffff; /* White buttons */
            color: #4a90e2;            /* Blue link color */
            padding: 15px 40px;
            margin: 12px;
            text-decoration: none;
            border-radius: 25px;       /* Extra round pill-shaped buttons */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Adds a soft shadow */
        }
        a:hover {
            background-color: #4a90e2;
            color: white;
        }
    </style>
